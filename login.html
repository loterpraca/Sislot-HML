<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>SISLOT — Login</title>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/login.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="brand-icon">SL</div>
        <div class="login-title">SISLOT</div>
        <div class="login-subtitle">Sistema de Lotéricas</div>
      </div>

      <form id="formLogin" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">E-mail</label>
          <input
            type="email"
            id="email"
            class="form-input"
            autocomplete="username"
            autofocus
            placeholder="seu@email.com"
          />
          <div class="field-error" id="errEmail">Informe um e-mail válido</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="senha">Senha</label>
          <input
            type="password"
            id="senha"
            class="form-input"
            autocomplete="current-password"
            placeholder="••••••••"
          />
          <div class="field-error" id="errSenha">Informe sua senha</div>
        </div>

        <button type="submit" class="btn" id="btnLogin">
          <span id="btnTexto">Entrar</span>
          <div class="spinner" id="spinner"></div>
        </button>

        <div class="alert" id="alertErro"></div>
      </form>

      <div class="version">v2.0 · Supabase Auth</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="./sislot-config.js"></script>
  <script src="./sislot-security.js"></script>
  <script src="./js/login.js"></script>
</body>
</html>
