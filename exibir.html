<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>SISLOT — Exibir Operacional</title>
  <link rel="icon" href="data:,">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./css/exibir.css"/>
</head>
<body>

<header class="topbar">
  <div class="topbar-brand">
    <div class="brand-icon">SL</div>
    <div>
      <div class="brand-name">SISLOT</div>
      <div class="brand-sub">Exibir Operacional</div>
    </div>
  </div>

  <div class="topbar-right">
    <div class="clock" id="relogio">--:--:--</div>

    <button class="btn-top" onclick="location.href='./menu.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Menu
    </button>

    <button class="btn-top btn-top-sair" id="btnLogout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sair
    </button>
  </div>
</header>

<div class="main">
  <div class="filters-bar">
    <div class="filter-group">
      <div class="filter-label">Data Referência</div>
      <input type="date" id="fDataRef" class="filter-input" style="width:140px"/>
    </div>

    <div class="filter-group">
      <div class="filter-label">Dt Concurso de</div>
      <input type="date" id="fDtConcDe" class="filter-input" style="width:140px"/>
    </div>

    <div class="filter-group">
      <div class="filter-label">até</div>
      <input type="date" id="fDtConcAte" class="filter-input" style="width:140px"/>
    </div>

    <div class="filter-group">
      <div class="filter-label">Modalidade</div>
      <select id="fModal" class="filter-select" style="width:140px">
        <option value="">Todas</option>
        <option>Mega Sena</option>
        <option>Lotofácil</option>
        <option>Quina</option>
        <option>Dupla Sena</option>
        <option>Dia de Sorte</option>
        <option>Supersete</option>
        <option>Milionária</option>
        <option>Timemania</option>
        <option>Loteca</option>
        <option>Páscoa</option>
        <option>São João</option>
        <option>Independência</option>
        <option>Virada</option>
      </select>
    </div>

    <div class="filter-group">
      <div class="filter-label">Concurso</div>
      <input type="text" id="fConc" class="filter-input" placeholder="Ex: 2940" style="width:90px"/>
    </div>

    <div class="filter-group">
      <div class="filter-label">Loja Origem</div>
      <select id="fLoja" class="filter-select" style="width:130px">
        <option value="">Todas</option>
      </select>
    </div>

    <div class="filter-group">
      <div class="filter-label">Status</div>
      <select id="fStatus" class="filter-select" style="width:110px">
        <option value="">Todos</option>
        <option value="ATIVO">Ativo</option>
        <option value="ENCERRADO">Encerrado</option>
        <option value="CANCELADO">Cancelado</option>
      </select>
    </div>

   <div class="filter-group">
  <div class="filter-label">Status</div>
  <select id="fStatus" class="filter-select" style="width:110px">
    <option value="">Todos</option>
    <option value="ATIVO">Ativo</option>
    <option value="ENCERRADO">Encerrado</option>
    <option value="CANCELADO">Cancelado</option>
  </select>
</div>

<div style="display:flex;gap:8px;align-items:flex-end;margin-left:auto">
  <button class="btn-limpar" onclick="limpar()">Limpar</button>
</div>
</div>

  <div class="stats-row" id="statsRow" style="display:none"></div>

  <div id="tableArea">
    <div class="state-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="3" y1="15" x2="21" y2="15"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
      </svg>
      <div class="state-title">Selecione os filtros e clique em Exibir</div>
      <div class="state-sub">A tela mostrará dados operacionais de venda, estoque e encalhe por bolão.</div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="./sislot-config.js"></script>
<script src="./js/exibir.js"></script>
</body>
</html>
