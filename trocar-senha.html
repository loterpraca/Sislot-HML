<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trocar senha de usuário</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --ok: #22c55e;
      --err: #ef4444;
      --border: #334155;
      --btn: #2563eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: rgba(17, 24, 39, 0.96);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
      outline: none;
      font-size: 15px;
    }

    input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96,165,250,.16);
    }

    button {
      width: 100%;
      margin-top: 18px;
      border: 0;
      border-radius: 12px;
      padding: 13px 16px;
      background: var(--btn);
      color: white;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
    }

    button:disabled {
      opacity: .65;
      cursor: not-allowed;
    }

    .status {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
      white-space: pre-wrap;
    }

    .status.ok {
      display: block;
      background: rgba(34, 197, 94, .12);
      border: 1px solid rgba(34, 197, 94, .4);
      color: #bbf7d0;
    }

    .status.err {
      display: block;
      background: rgba(239, 68, 68, .12);
      border: 1px solid rgba(239, 68, 68, .4);
      color: #fecaca;
    }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }
  </style>

  <script>
    window.SISLOT_CONFIG = {
      supabaseUrl: "https://SEU-PROJETO.supabase.co",
      supabaseAnonKey: "SUA_ANON_KEY"
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="card">
    <h1>Trocar senha</h1>
    <p>Use o ID interno do usuário cadastrado na tabela <strong>usuarios</strong>.</p>

    <form id="formTrocaSenha">
      <label for="usuario_id">ID do usuário</label>
      <input id="usuario_id" name="usuario_id" type="number" min="1" required />

      <label for="nova_senha">Nova senha</label>
      <input id="nova_senha" name="nova_senha" type="password" minlength="8" required />

      <label for="confirmar_senha">Confirmar nova senha</label>
      <input id="confirmar_senha" name="confirmar_senha" type="password" minlength="8" required />

      <button id="btnSalvar" type="submit">Trocar senha</button>

      <div id="status" class="status"></div>
      <div class="hint">Mínimo recomendado: 8 caracteres.</div>
    </form>
  </div>

  <script src="./trocar-senha.js"></script>
</body>
</html>
